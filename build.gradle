plugins {
    // Apply the java-library plugin to add support for Java Library
    id 'java-library'
    id 'maven-publish'
}

final String VERSION = "1.1.0"
final String SUFFIX = "-beta"

def dbsmVersion = VERSION

System.setProperty("org.gradle.internal.publish.checksums.insecure", "true")

repositories {
    mavenCentral()
}

dependencies {

    // TODO convert to maven dependencies
    implementation fileTree("${etendo_project}/WebContent/WEB-INF/lib")
    implementation fileTree("${etendo_project}/build/lib")

    implementation fileTree("${etendo_project}/lib/test")
    implementation fileTree("${etendo_project}/src-db/database/lib")

    implementation files("${etendo_project}/build/classes")
    implementation files("${etendo_project}/src-core/build/classes")

}

sourceSets {
    main {
        java {
            srcDirs 'src'
        }
        resources {
            srcDirs 'resources'
        }
    }
}

publishing {
    publications {
        maven(MavenPublication) {
            groupId "com.etendoerp"
            artifactId "dbsm"
            version(dbsmVersion)
            artifact file("build/libs/dbsourcemanager.jar")
        }
    }
    repositories {
        maven {
            credentials {
                username = "${githubUser}"
                password = "${githubToken}"
            }
            url "https://maven.pkg.github.com/etendosoftware/dbsm/"
        }
    }
}

jar {
    archivesBaseName = "dbsourcemanager"
}

task deploy(dependsOn: jar, type: Copy) {
    from 'build/libs/dbsourcemanager.jar'
    into "${etendo_project}/src-db/database/lib/"
}

task upgradeVersion() {
    final String MAJOR = 'major'
    final String MINOR = 'minor'
    final String PATCH = 'patch'
    doLast {
        def typeVersion
        if (project.hasProperty('type')){
            typeVersion = project.getProperty('type')
        } else {
            throw new GradleException("The parameter -Ptype is required")
        }

        if (typeVersion != MAJOR && typeVersion != MINOR && typeVersion != PATCH) {
            throw new GradleException("The parameter value '${typeVersion}' is not valid, the options should be 'major', 'minor' or 'patch'")
        }

        def versionParts = VERSION.trim().split("\\.")
        if (versionParts.length != 3) {
            throw new GradleException("The version must be in the format major.minor.patch")
        }

        int major = versionParts[0].toInteger()
        int minor = versionParts[1].toInteger()
        int patch = versionParts[2].toInteger()

        if (typeVersion == MAJOR) {
            major++
            minor = 0
            patch = 0
        } else if (typeVersion == MINOR) {
            minor++
            patch = 0
        } else if (typeVersion == PATCH) {
            patch++
        }

        println "Version: ${major}.${minor}.${patch}"
        def nextVersion = "${major}.${minor}.${patch}"

        // Rewrite build.gradle file with new value
        def buildGradleContent = file('build.gradle').text
        buildGradleContent = buildGradleContent.replaceAll(/VERSION = \"${VERSION}\"/, "VERSION = \"${nextVersion}\"")
        file('build.gradle').write(buildGradleContent)
    }
}
